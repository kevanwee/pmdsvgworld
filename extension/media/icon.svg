  <!-- Eye -->
  <circle cx="64" cy="56" r="5" fill="white" opacity="0.9"/>
  <!-- Star sparkles -->
  <text x="18" y="30" font-size="14" fill="#FFD700">✦</text>
  <text x="95" y="95" font-size="10" fill="#00ffaa">✦</text>
  <text x="20" y="100" font-size="8"  fill="#3A7BFF">✦</text>
</svg>
