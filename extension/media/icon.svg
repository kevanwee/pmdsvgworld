<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <rect width="128" height="128" fill="#0a1218" rx="16"/>
  <!-- Diamond body (Diancie) -->
  <polygon points="64,20 90,64 64,108 38,64" fill="#FF85C8" opacity="0.9"/>
  <polygon points="64,28 84,64 64,100 44,64" fill="#FFE0F0" opacity="0.6"/>
  <!-- Glow -->
